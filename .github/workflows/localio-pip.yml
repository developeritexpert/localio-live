name: Update code on server

on:
  push:
    branches:
      - main   

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/localio/public_html
            
            git config --global --add safe.directory /home/localio/public_html
            
            git fetch https://${{ secrets.GIT_USERNAME }}:${{ secrets.DEPLOY_TOKEN }}@github.com/HiteshRajput00/localio.git  main 
            git reset --hard FETCH_HEAD
            sudo chown -R localio:localio /home/localio/public_html
            echo "Deployment complete"
